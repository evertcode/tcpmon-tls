name: Build Jar

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build shaded jar
        run: mvn -q package

      - name: Resolve artifact version
        id: version
        shell: bash
        run: |
          raw_version="$(grep -m1 '<version>' pom.xml | sed -E 's#.*<version>([^<]+)</version>.*#\1#')"
          clean_version="${raw_version%-SNAPSHOT}"
          echo "raw_version=${raw_version}" >> "$GITHUB_OUTPUT"
          echo "clean_version=${clean_version}" >> "$GITHUB_OUTPUT"

      - name: Rename jar artifact
        shell: bash
        run: |
          shopt -s nullglob
          target_jar="target/tcpmon-tls-${{ steps.version.outputs.clean_version }}.jar"
          raw_jar="target/tcpmon-tls-${{ steps.version.outputs.raw_version }}.jar"
          if [[ -f "$target_jar" ]]; then
            echo "Jar already has release name: $target_jar"
            exit 0
          fi
          if [[ -f "$raw_jar" ]]; then
            cp "$raw_jar" "$target_jar"
            exit 0
          fi
          jars=(target/tcpmon-tls-*.jar)
          for jar in "${jars[@]}"; do
            if [[ "$jar" == *"-sources.jar" || "$jar" == *"-javadoc.jar" || "$jar" == *"/original-"* ]]; then
              continue
            fi
            if [[ "$jar" == "$target_jar" ]]; then
              echo "Jar already has release name: $target_jar"
              exit 0
            fi
            cp "$jar" "$target_jar"
            exit 0
          done
          echo "No packaged jar found in target/" >&2
          exit 1

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: tcpmon-tls-${{ steps.version.outputs.clean_version }}
          path: target/tcpmon-tls-${{ steps.version.outputs.clean_version }}.jar
          if-no-files-found: error
