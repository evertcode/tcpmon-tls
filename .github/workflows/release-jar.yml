name: Release Jar

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Resolve version and validate tag
        id: version
        shell: bash
        run: |
          raw_version="$(grep -m1 '<version>' pom.xml | sed -E 's#.*<version>([^<]+)</version>.*#\1#')"
          clean_version="${raw_version%-SNAPSHOT}"
          tag_name="${GITHUB_REF_NAME}"
          tag_version="${tag_name#v}"
          if [[ "$tag_version" != "$clean_version" ]]; then
            echo "Tag version ($tag_version) does not match pom version ($clean_version)" >&2
            exit 1
          fi
          echo "raw_version=${raw_version}" >> "$GITHUB_OUTPUT"
          echo "clean_version=${clean_version}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"

      - name: Build shaded jar
        run: mvn -q package

      - name: Rename jar artifact
        shell: bash
        run: |
          shopt -s nullglob
          jars=(target/tcpmon-tls-*.jar)
          for jar in "${jars[@]}"; do
            if [[ "$jar" == *"-sources.jar" || "$jar" == *"-javadoc.jar" ]]; then
              continue
            fi
            cp "$jar" "target/tcpmon-tls-${{ steps.version.outputs.clean_version }}.jar"
            exit 0
          done
          echo "No packaged jar found in target/" >&2
          exit 1

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: ${{ steps.version.outputs.tag_name }}
          files: target/tcpmon-tls-${{ steps.version.outputs.clean_version }}.jar
